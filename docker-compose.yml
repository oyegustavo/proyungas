version: '3.7'
services: 
    servicio-eureka-server:
        build: ./servicio-eureka-server-master
        image: springboot-servicio-eureka-server:v1
        ports: 
            - "8761:8761"
        restart: always
        networks: 
                - servicios
    servicio-usuarios:
        build: ./servicio-usuarios-master
        image: servicio-usuarios:v1
        restart: always
        networks: 
                - servicios
        depends_on: 
            - servicio-eureka-server
    servicio-zuul-server:
        build: ./servicio-zuul-server-master
        image: springboot-servicio-zuul-server:v1
        ports: 
            - "8090:8090"
        restart: always
        networks: 
                - servicios
        depends_on: 
            - servicio-eureka-server
    servicio-oauth:
        build: ./servicio-oauth-master
        image: springboot-servicio-zuul-server:v1
        ports: 
            - "9100:9100"
        restart: always
        networks: 
                - servicios
        depends_on: 
            - servicio-eureka-server 
networks: 
    servicios: {}