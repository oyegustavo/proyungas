spring.application.name=common-zuul-server

eureka.client.serviceUrl.defaultZone=http://servicio-commons-eureka-server:8761/eureka

zuul.routes.security.service-id=servicio-oauth
zuul.routes.security.path=/api/security/**

zuul.routes.abogados.service-id=api-abogados
zuul.routes.abogados.path=/api/abogados/**

zuul.routes.params.service-id=api-params
zuul.routes.params.path=/api/params/**

zuul.routes.persons.service-id=api-persons
zuul.routes.persons.path=/api/persons/**

zuul.routes.renaper.service-id=api-renaper
zuul.routes.renaper.path=/api/renaper/**

zuul.routes.sae.service-id=api-sae
zuul.routes.sae.path=/api/sae/**

zuul.routes.usuarios.service-id=servicio-usuarios
zuul.routes.usuarios.path=/api/usuarios/**

zuul.sensitiveHeaders=Cookie,Set-Cookie

hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds: 150000000
ribbon.ConnectTimeout: 300000
ribbon.ReadTimeout: 1000000

eureka.instance.preferIpAddress=true
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.client.healthcheck.enabled=true

zuul.host.connect-timeout-millis=600000000
zuul.host.max-per-route-connections=100000000
zuul.host.max-total-connections=50000000
zuul.host.socket-timeout-millis=600000000
zuul.semaphore.max-semaphores=5000000
zuul.ribbon.eager-load.enabled= true

spring.sleuth.sampler.probability=1.0
spring.zipkin.baseUrl=http://servicio-commons-zipkin:9411

logging.file.name= ./log/zuul.log
